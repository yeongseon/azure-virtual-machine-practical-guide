site_name: Azure Virtual Machine Practical Guide
site_url: https://yeongseon.github.io/azure-virtual-machine-practical-guide/
site_description: Azure VM practical guide — platform internals, operations, and troubleshooting
  grounded in MS Learn
site_author: yeongseon
repo_name: yeongseon/azure-virtual-machine-practical-guide
repo_url: https://github.com/yeongseon/azure-virtual-machine-practical-guide
exclude_docs: 'troubleshooting/backup-failures.md

  troubleshooting/boot-diagnostics-and-serial-console.md

  troubleshooting/cannot-rdp-or-ssh.md

  troubleshooting/disk-performance-issues.md

  troubleshooting/dns-and-connectivity-issues.md

  troubleshooting/extension-failures.md

  troubleshooting/high-cpu-memory-disk.md

  troubleshooting/slow-performance.md

  troubleshooting/vm-wont-start.md

  '
theme:
  name: material
  language: en
  custom_dir: docs
  favicon: assets/favicon.svg
  logo: assets/logo.svg
  icon:
    repo: fontawesome/brands/github
  palette:
  - scheme: default
    primary: indigo
    accent: indigo
    toggle:
      icon: material/brightness-7
      name: Switch to dark mode
  - scheme: slate
    primary: indigo
    accent: indigo
    toggle:
      icon: material/brightness-4
      name: Switch to light mode
  features:
  - navigation.tabs
  - navigation.sections
  - navigation.expand
  - navigation.top
  - navigation.indexes
  - search.suggest
  - search.highlight
  - content.code.copy
  - content.code.annotate
  - content.tabs.link
extra_css:
- stylesheets/extra.css
extra_javascript:
- https://unpkg.com/mermaid@10/dist/mermaid.min.js
- javascripts/mermaid-zoom.js
plugins:
- search
- minify:
    minify_html: true
validation:
  nav:
    omitted_files: warn
  links:
    not_found: warn
    anchors: warn
    absolute_links: warn
    unrecognized_links: warn
markdown_extensions:
- admonition
- pymdownx.details
- pymdownx.superfences:
    custom_fences:
    - name: mermaid
      class: mermaid
- pymdownx.tabbed:
    alternate_style: true
- pymdownx.highlight:
    anchor_linenums: true
- pymdownx.inlinehilite
- pymdownx.snippets
- pymdownx.mark
- attr_list
- md_in_html
- pymdownx.emoji
- tables
- toc:
    permalink: true
